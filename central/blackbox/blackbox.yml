modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_status_codes: [200, 204, 301, 302, 401, 403, 404]
      method: GET
      fail_if_not_ssl: true
      tls_config:
        insecure_skip_verify: false
      preferred_ip_protocol: ip4
  tcp_connect:
    prober: tcp
    timeout: 8s
    tcp:
      preferred_ip_protocol: ip4
