name: itg-mon-agent

networks:
  agent-net:
    driver: bridge
  panel-net:
    external: true
    name: ${PANEL_NETWORK}

services:
  # node-exporter listens on :9100 with network_mode: host, binding on all host interfaces.
  # Access must be restricted by host firewall to central Prometheus IP only.
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.8.2
    container_name: mon-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.systemd
      - --collector.processes
    pid: host
    network_mode: host
    volumes:
      - /:/host:ro,rslave

  # Метрики контейнеров через Docker API (docker.sock), а не cgroup/cAdvisor:
  # у ряда VPS (LXC-вложенный Docker) cAdvisor не читает overlayfs layerdb и не
  # видит контейнеры по имени. Этот exporter берёт docker stats напрямую.
  # Caddy отдаёт его по историческому пути /cadvisor (central-конфиг не трогаем).
  dockerstats:
    image: wywywywy/docker_stats_exporter:latest
    container_name: mon-dockerstats
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - agent-net

  xray-exporter:
    image: ghcr.io/compassvpn/xray-exporter:latest
    container_name: mon-xray-exporter
    restart: unless-stopped
    command:
      - --xray-endpoint=${XRAY_API_ENDPOINT}
      - --listen=:9550
      - --user-traffic-metrics
    networks:
      - agent-net
      - panel-net

  caddy-metrics:
    image: caddy:2-alpine
    container_name: mon-caddy-metrics
    restart: unless-stopped
    env_file: .env
    ports:
      - "${METRICS_PORT}:${METRICS_PORT}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks:
      - agent-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy-data:
